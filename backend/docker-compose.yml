version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://nexus_user:nexus_password@db:5432/nexus_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=supersecretnexusoscorekey321
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: nexus_postgres
    environment:
      - POSTGRES_USER=nexus_user
      - POSTGRES_PASSWORD=nexus_password
      - POSTGRES_DB=nexus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: nexus_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  ollama_data:
